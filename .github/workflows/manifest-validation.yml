name: manifest-validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a

      - name: Helm lint
        run: helm lint deploy/helm/agent-sla

      - name: Helm template render
        run: helm template agent-sla deploy/helm/agent-sla > rendered.yaml

      - name: Validate Kubernetes manifests
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work ghcr.io/yannh/kubeconform:latest -strict -summary rendered.yaml
