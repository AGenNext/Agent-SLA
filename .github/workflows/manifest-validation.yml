name: manifest-validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/agent-sla

      - name: Helm template render
        run: helm template agent-sla deploy/helm/agent-sla > rendered.yaml

      - name: Validate Kubernetes manifests
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          args: -strict -summary rendered.yaml
