name: provenance

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

jobs:
  provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: |
            apps/api/**
            packages/**
