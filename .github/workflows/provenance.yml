name: provenance

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

jobs:
  provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            apps/api/**
            packages/**
