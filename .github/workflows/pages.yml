name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: GITHUB_PAGES=true npm run build --workspace @agennext/agent-sla-site
      - name: Publish static export to gh-pages
        run: |
          set -euo pipefail
          mkdir -p /tmp/agent-sla-site-out
          cp -R apps/site/out/. /tmp/agent-sla-site-out/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R /tmp/agent-sla-site-out/. .
          touch .nojekyll
          git add .
          git commit -m "Deploy GitHub Pages"
          git push --force origin gh-pages
