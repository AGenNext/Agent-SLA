name: chart-testing

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  chart-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run Helm lint
        run: helm lint deploy/helm/agent-sla

      - name: Render Helm templates
        run: helm template agent-sla deploy/helm/agent-sla
