name: chart-testing

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  chart-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a

      - name: Run Helm lint
        run: helm lint deploy/helm/agent-sla

      - name: Render Helm templates
        run: helm template agent-sla deploy/helm/agent-sla
