name: Release Enforcement

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  attestations: write
  id-token: write

env:
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release-verify:
    name: Release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:verify

  python:
    name: Python SDK verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: PYTHONPATH=packages/sdk-python python -m unittest discover packages/sdk-python/tests

  rust:
    name: Rust SDK verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: rustup default stable
      - run: cargo test --manifest-path packages/sdk-rust/Cargo.toml

  codeql:
    name: CodeQL security analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: github/codeql-action/init@fee9466b8957867761f2d78f922ab084e3e2dd17
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@fee9466b8957867761f2d78f922ab084e3e2dd17

  containers:
    name: Container build gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: docker build -t agennext/agent-sla-api:release .
      - run: docker build -f Dockerfile.mcp -t agennext/agent-sla-mcp:release .
      - name: Scan API image
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.58.2 image --severity CRITICAL,HIGH --exit-code 1 --ignore-unfixed agennext/agent-sla-api:release
      - name: Scan MCP image
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.58.2 image --severity CRITICAL,HIGH --exit-code 1 --ignore-unfixed agennext/agent-sla-mcp:release

  sbom:
    name: Generate release SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: docker run --rm -v "$PWD:/workspace" anchore/syft:latest dir:/workspace -o spdx-json=/workspace/agent-sla-release.spdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-sbom
          path: agent-sla-release.spdx.json

  enforce-release:
    name: Enforce release gates
    runs-on: ubuntu-latest
    needs:
      - release-verify
      - python
      - rust
      - codeql
      - containers
      - sbom
    steps:
      - run: echo "All release gates passed."
