name: Release Enforcement

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  attestations: write
  id-token: write

env:
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release-verify:
    name: Release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:verify

  python:
    name: Python SDK verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: PYTHONPATH=packages/sdk-python python -m unittest discover packages/sdk-python/tests

  rust:
    name: Rust SDK verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path packages/sdk-rust/Cargo.toml

  codeql:
    name: CodeQL security analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  containers:
    name: Container build gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t agennext/agent-sla-api:release .
      - run: docker build -f Dockerfile.mcp -t agennext/agent-sla-mcp:release .
      - name: Scan API image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: agennext/agent-sla-api:release
          format: sarif
          output: trivy-api-release.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Scan MCP image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: agennext/agent-sla-mcp:release
          format: sarif
          output: trivy-mcp-release.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api-release.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-mcp-release.sarif

  sbom:
    name: Generate release SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: agent-sla-release.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-sbom
          path: agent-sla-release.spdx.json

  enforce-release:
    name: Enforce release gates
    runs-on: ubuntu-latest
    needs:
      - release-verify
      - python
      - rust
      - codeql
      - containers
      - sbom
    steps:
      - run: echo "All release gates passed."
