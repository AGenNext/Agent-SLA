name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run build --workspace @agennext/agent-sla-site
      - run: npm run e2e
      - run: npm run security:evaluate

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: PYTHONPATH=packages/sdk-python python -m unittest discover packages/sdk-python/tests

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: rustup default stable
      - run: cargo test --manifest-path packages/sdk-rust/Cargo.toml

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: docker build -t agennext/agent-sla-api:ci .
      - run: docker build -f Dockerfile.mcp -t agennext/agent-sla-mcp:ci .
      - name: Scan API image
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.58.2 image --severity CRITICAL,HIGH --exit-code 1 --ignore-unfixed agennext/agent-sla-api:ci
      - name: Scan MCP image
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.58.2 image --severity CRITICAL,HIGH --exit-code 1 --ignore-unfixed agennext/agent-sla-mcp:ci

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: docker run --rm -v "$PWD:/workspace" anchore/syft:latest dir:/workspace -o spdx-json=/workspace/agent-sla.spdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-sla-sbom
          path: agent-sla.spdx.json
