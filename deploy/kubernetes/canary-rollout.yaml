apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: agent-sla-api
  labels:
    app.kubernetes.io/name: agent-sla
    app.kubernetes.io/component: api
spec:
  replicas: 4
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-sla
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-sla
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/agennext/agent-sla-api:latest
          ports:
            - containerPort: 3000
  strategy:
    canary:
      stableService: agent-sla-api
      canaryService: agent-sla-api-canary
      trafficRouting:
        nginx:
          stableIngress: agent-sla-api
      steps:
        - setWeight: 10
        - pause:
            duration: 60s
        - setWeight: 25
        - pause:
            duration: 120s
        - setWeight: 50
        - pause:
            duration: 300s
        - setWeight: 100
