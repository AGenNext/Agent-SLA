apiVersion: v1
kind: Service
metadata:
  name: agent-sla-api-canary
  labels:
    app.kubernetes.io/name: agent-sla
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: agent-sla
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: agent-sla-api
  labels:
    app.kubernetes.io/name: agent-sla
    app.kubernetes.io/component: api
spec:
  replicas: 4
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-sla
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-sla
        app.kubernetes.io/component: api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/agennext/agent-sla-api:latest
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
  strategy:
    canary:
      stableService: agent-sla-api
      canaryService: agent-sla-api-canary
      trafficRouting:
        nginx:
          stableIngress: agent-sla-api
      steps:
        - setWeight: 10
        - pause:
            duration: 60s
        - setWeight: 25
        - pause:
            duration: 120s
        - setWeight: 50
        - pause:
            duration: 300s
        - setWeight: 100
