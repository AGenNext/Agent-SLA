apiVersion: v1
kind: Secret
metadata:
  name: agent-sla-api
  labels:
    app.kubernetes.io/name: agent-sla
    app.kubernetes.io/component: api
type: Opaque
stringData:
  AGENT_SLA_API_TOKEN: change-me
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-sla-api
  labels:
    app.kubernetes.io/name: agent-sla
    app.kubernetes.io/component: api
data:
  NODE_ENV: production
  PORT: "3000"
  HOST: 0.0.0.0
  CORS_ALLOW_ORIGIN: ""
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "120"
  TRUSTED_CLIENT_IP_HEADER: x-forwarded-for
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-sla-api
  labels:
    app.kubernetes.io/name: agent-sla
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-sla
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-sla
        app.kubernetes.io/component: api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/agennext/agent-sla-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: agent-sla-api
            - secretRef:
                name: agent-sla-api
          readinessProbe:
            httpGet:
              path: /ready
              port: http
              httpHeaders:
                - name: Authorization
                  value: Bearer change-me
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: agent-sla-api
  labels:
    app.kubernetes.io/name: agent-sla
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agent-sla
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
