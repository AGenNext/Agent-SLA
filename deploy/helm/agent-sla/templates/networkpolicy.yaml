{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  namespace: {{ default .Release.Namespace .Values.namespaceOverride }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
{{ toYaml .Values.networkPolicy.ingressNamespaceSelector | indent 12 }}
      ports:
        - protocol: TCP
          port: 3000
  egress:
{{- if .Values.networkPolicy.allowDnsEgress }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
    - to:
        - namespaceSelector:
{{ toYaml .Values.networkPolicy.egressNamespaceSelector | indent 12 }}
      ports:
        - protocol: TCP
          port: 443
